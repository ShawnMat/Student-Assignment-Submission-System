<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>

    <link rel="stylesheet" href="/styles/studentLogin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container-fluid d-flex justify-content-between">
        <div class="loginImage">
            <img id="sideLoginImage" src="/assets/images/loginImage.jpg">
        </div>
        <div class="card loginCard m-auto ">
            <div class="card-body">
                <div class="card-title text-center mb-3 fs-3">STUDENT LOGIN</div>
                <div class="card-text">
                    <div class="form">
                        <div class="username mt-4">
                            <p class="form-label">Username</p>
                            <input type="text" class="form-control" id="username">
                        </div>
                        <div class="password mt-4">
                            <p class="form-label">Password</p>
                            <input type="text" class="form-control" id="password">
                        </div>
                        <p class="mt-2"><a href="" class="text-decoration-none">Forget Password?</a></p>
                        <div class="submitButton text-center mt-5">
                            <button class="submit w-100 rounded-2">Login</button>
                        </div>
                        <div class="newStudent d-flex mt-2 justify-content-between">
                            <p>Don't have an account?</p>
                            <a href="/pages/studentSignup.html" class="text-decoration-none">Register here</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="/scripts/studentLogin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
