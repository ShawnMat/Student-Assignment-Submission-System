<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Sample Dashboard </title>
    <link rel="stylesheet" href="/styles/trainerDashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class=" sidebar col-2 d-flex flex-column justify-content-between gap-5 p-4">
                <div class="brandName d-flex gap-3 ">
                    <img src="/assets/images/loginImage.jpg" id="logo-image">
                    <h4>UBSASS</h4>
                </div>
                <div class="container-fluid sidebar-options d-flex flex-column gap-4 align-content-center">
                    <button id="dashboardBtn" class=" btn sidebarBtns d-flex gap-4">
                        <i class="bi bi-microsoft p-1"></i>
                        <a href="" class="sidedbarBtns text-decoration-none text-black fs-5">Dashboard</a>
                    </button>
                    <button id="assignmentBtn" class=" btn sidebarBtns d-flex gap-4">
                        <i class="bi bi-file-text p1"></i>
                        <a href="" class="sidebarBtnds text-decoration-none text-black fs-5">Assignments</a>
                    </button>
                    <button id="filterBtn" class="btn sidebarBtns d-flex gap-4">
                        <i class="bi bi-funnel p-1"></i>
                        <a href="" class="sidebarBtdns text-decoration-none text-black fs-5">Filters</a>
                    </button>
                    <button id="calendarBtn" class="btn sidebarBtns d-flex gap-4">
                        <i class="bi bi-calendar4-week p-1"></i>
                        <a href="" class="sidebarBtnds text-decoration-none text-black fs-5">Calender</a>
                    </button>
                    <!-- <button class="btn"><a href="" class="text-decoration-none text-light fs-5">Dashboard</a></button> -->
                </div>
                <div class="container-fluid">
                    saddssdffs
                </div>
                
            </div>
            <div class="col-10 p-0">
                <div class="navbar-cont d-flex justify-content-between p-4">
                    <div class="greetings-cont">
                        <p>Good Morning!</p>
                        <p id="userName"></p>
                    </div>
                    <div class="search-cont d-flex gap-4">
                        <i class="bi bi-search"></i>
                        <input type="search" id="searchFilter">
                    </div>
                    <div class="profile-cont d-flex gap-3">
                        <i class="bi bi-person-square"></i>
                        <p class="profile">Student Name</p>
                    </div>
                </div>
                <!-- WorkSpace Container -->
                <div class="container-fluid workspace ">
                <!-- Work Area or Assignment viewer -->
                        <div class="workArea w-100">
                            <div class="container-fluid h-25 p-4">
                                <div class="row counter-cont h-100 d-flex flex-wrap  gap-3">
                                    <div class="counters col-3 bg-success">
                                        <p>Completed</p>
                                        <p id="completedCount"></p>
                                    </div>
                                    <div class="counters col-3 bg-primary">
                                        <p>Assigned</p>
                                        <p id="assignedCount"></p>
                                    </div>
                                    <div class="counters col-3 bg-warning">
                                        <p>Pending</p>
                                        <p id="pendingCount"></p>
                                    </div>
                                    <div class="counters col-3 bg-danger">
                                        <p>OverDue</p>
                                        <p id="overDueCount"></p>
                                    </div>
                                </div>
                            </div>
                            <div class="container quickViews-cont h-75 ">
                                <div class="rows d-flex gap-1">
                                    <div class="quickViews col-5 text-center p-3 " id="viewClasses">
                                        <p>All Classes</p>
                                        <div class="viewContent bg-light">
                                            <!-- <p>hellllooo</p> -->
                                        </div>
                                    </div>
                                    <div class="quickViews col-7  text-center p-3" id="viewCourses">
                                        <p>All Courses</p>
                                        <div class="viewContent bg-light">
                                            <!-- <p>helllloooo</p> -->
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- All Classes  -->
                        <div class="container classArea mt-4 p-4">
                            <div class="classContent shadow-lg bg-light rounded-2 p-3 ">
                                <div class="topContent d-flex justify-content-between">
                                    <p>All Assignments</p>
                                    <button class="btn bg-info" data-bs-toggle="modal" data-bs-target="#createAssignmentModal" id="createClsBtn">Create Assignment</button>
                                </div>
                                <div class="contentCards-cont">
                                </div>
                            </div>
                        </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="createAssignmentModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h4>Create Assignemnt</h4>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label >Assignment ID</label>
                    <input type="text" class="form-control" id="assignmentID">
                    <label >Assignment Name</label>
                    <input type="text" class="form-control" id="assignmentName">
                    <label >Assignemnt Type</label>
                    <input type="text" class="form-control" id="assignmentType">
                    <label >Assignemnt Description</label>
                    <input type="area" class="form-control" id="assignmentDesc">
                    <label >Due Date</label>
                    <input type="date" class="form-control" id="dueDate">
                    <label >Assign to which Course</label>
                    <input type="text" class="form-control" id="assignToCourse">
                    <label >Assign to which Year</label>
                    <input type="number" class="form-control" id="assignToYear">
                </div>
                <div class="modal-footer d-flex justify-content-between">
                    <button id="clearValuesBtn">Clear All</button>
                    <button id="createAssignmentBtn">Create</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <script src="/scripts/trainerDashboard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
