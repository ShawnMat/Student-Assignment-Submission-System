<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Sample Dashboard </title>
    <link rel="stylesheet" href="/styles/studentSampleDashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class=" sidebar col-2 d-flex flex-column justify-content-between bg-light gap-5 p-4">
                <div class="brandName d-flex gap-3 ">
                    <img src="/assets/images/loginImage.jpg" id="logo-image">
                    <h4>UBSASS</h4>
                </div>
                <div class="container-fluid sidebar-options d-flex flex-column gap-4 align-content-center">
                    <button id="dashboardBtn" class=" btn sidebarBtns d-flex gap-4">
                        <i class="bi bi-microsoft p-1"></i>
                        <a href="" class="sidedbarBtns text-decoration-none text-black fs-5">Dashboard</a>
                    </button>
                    <button id="coursesBtn" class=" btn sidebarBtns d-flex gap-4">
                        <i class="bi bi-file-text p1"></i>
                        <a href="" class="sidebarBtnds text-decoration-none text-black fs-5">Courses</a>
                    </button>
                    <button id="filterBtn" class="btn sidebarBtns d-flex gap-4">
                        <i class="bi bi-funnel p-1"></i>
                        <a href="" class="sidebarBtdns text-decoration-none text-black fs-5">Filters</a>
                    </button>
                    <button id="calendarBtn" class="btn sidebarBtns d-flex gap-4">
                        <i class="bi bi-calendar4-week p-1"></i>
                        <a href="" class="sidebarBtnds text-decoration-none text-black fs-5">Calender</a>
                    </button>
                    <!-- <button class="btn"><a href="" class="text-decoration-none text-light fs-5">Dashboard</a></button> -->
                </div>
                <div class="container-fluid">
                    saddssdffs
                </div>
                
            </div>
            <div class="col-10 p-0">
                <div class="navbar-cont d-flex justify-content-between bg-light p-4">
                    <div class="greetings-cont">
                        <p>Good Morning!</p>
                        <p id="userName"></p>
                    </div>
                    <div class="search-cont d-flex gap-4">
                        <i class="bi bi-search"></i>
                        <input type="search" id="searchFilter">
                    </div>
                    <div class="profile-cont d-flex gap-3">
                        <i class="bi bi-person-square"></i>
                        <p class="profile">Student Name</p>
                    </div>
                </div>
                <!-- WorkSpace Container -->
                <div class="container-fluid workspace ">
                    <div class="row d-flex">
                        <!-- Work Area or Assignment viewer -->
                        <div class="workArea col-9">
                            <div class="heading d-flex justify-content-between bg-light mt-2 p-4 fs-5">
                                <p>Your Assignment</p>
                                <div class="filter-wrapper d-flex align-items-center gap-2">

                                    <i class="bi bi-funnel-fill filter-icon"></i>

                                    <select id="filter" class="form-select filter-select">
                                        <option selected disabled>Filter Assignments</option>
                                        <option value="Status">Status</option>
                                        <option value="Date">Due Date</option>
                                        <option value="All">Show All</option>
                                    </select>

                                </div>

                                <div class="modal fade" id="filterStatus">
                                    <div class="modal-dialog modal-dialog-centered">
                                        <div class="modal-content border-0 shadow-lg rounded-4">

                                            <div class="modal-header bg-info text-white">
                                                <h5 class="fw-bold mb-0">
                                                    <i class="bi bi-funnel-fill me-2"></i>
                                                    Filter By Status
                                                </h5>
                                                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                                            </div>

                                            <div class="modal-body">

                                                <label class="form-label fw-semibold">
                                                    Select Status
                                                </label>

                                                <select id="status" class="form-select">
                                                    <option value="Pending">Pending</option>
                                                    <option value="Completed">Completed</option>
                                                    <option value="Evaluated">Evaluated</option>
                                                    <option value="Over Due">Over Due</option>
                                                </select>

                                            </div>

                                            <div class="modal-footer border-0">
                                                <button class="btn btn-info text-white" id="filterStatusSubmitBtn">
                                                    Apply Filter
                                                </button>
                                            </div>

                                        </div>
                                    </div>
                                </div>

                                <div class="modal fade" id="filterDate">
                                    <div class="modal-dialog modal-dialog-centered">
                                        <div class="modal-content border-0 shadow-lg rounded-4">

                                            <div class="modal-header bg-info text-white">
                                                <h5 class="fw-bold mb-0">
                                                    <i class="bi bi-calendar-event me-2"></i>
                                                    Filter By Due Date
                                                </h5>
                                                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                                            </div>

                                            <div class="modal-body">

                                                <label class="form-label fw-semibold">
                                                    Start Date
                                                </label>

                                                <input type="date" id="startdate" class="form-control">

                                                <label class="form-label fw-semibold mt-3">
                                                    End Date
                                                </label>

                                                <input type="date" id="enddate" class="form-control">

                                            </div>

                                            <div class="modal-footer border-0">
                                                <button class="btn btn-info text-white" id="filterDateSubmitBtn">
                                                    Apply Filter
                                                </button>
                                            </div>

                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="row assignmentContainer"></div>
                        </div>
                        <!-- lookup container -->
                        <div class="lookups col-3 bg-light p-0">
                            <!-- dashboard counters -->
                            <div class="counters-cont bg-light d-flex flex-wrap p-2 gap-2">
                                <div id="completedCount" class="counters text-center bg-success p-1" >
                                    <p>Completed</p>
                                </div>
                                <div id="pendingCount" class="counters text-center bg-warning p-1">
                                    <p>Pending</p>
                                </div>
                                <div id="evaluatedCount" class="counters text-center bg-info p-1">
                                    <p>Evaluated</p>
                                </div>
                                <div id="overdueCount" class="counters text-center bg-danger p-1">
                                    <p>Overdue</p>
                                </div>
                            </div>
                            <!-- calender -->
                            <div class="calender-cont bg-light p-2">
                                <div class="calender text-center p-2 bg-white">
                                    CALENDER
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/scripts/studentDashboard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
